name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggers

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linter
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ --select E,F,I,N,W --ignore E501,F401,N818

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  test:
    needs: [lint]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_workspace_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,postgres]"

      - name: Test
        run: |
          pytest tests/ -q --tb=short \
            -k "not ollama and not browser and not test_ollama" \
            --ignore=tests/test_agents/test_orchestrator.py \
            --cov=src/ai_workspace \
            --cov-report=term-missing \
            --cov-fail-under=30
        env:
          AIW_TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/ai_workspace_test
          OLLAMA_HOST: http://localhost:11434  # Unused in CI, but prevents errors

  deploy:
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy trigger
        run: |
          echo "✅ CI passed on main branch."
          echo "Configure HOMELAB_WEBHOOK_URL secret to enable auto-deploy to NixOS."
          if [ -n "$HOMELAB_WEBHOOK_URL" ]; then
            curl -X POST "$HOMELAB_WEBHOOK_URL"
          fi
        env:
          HOMELAB_WEBHOOK_URL: ${{ secrets.HOMELAB_WEBHOOK_URL }}
