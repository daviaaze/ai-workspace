name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_workspace_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ --select E,F,W --ignore E501

      - name: Type check (info only)
        run: mypy src/ --ignore-missing-imports || true
        continue-on-error: true

      - name: Test
        run: pytest tests/ -q --tb=short --ignore=tests/test_agents/test_orchestrator.py -k "not test_ollama"
        env:
          AIW_TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/ai_workspace_test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger homelab rebuild
        run: |
          echo "Deploy would trigger homelab rebuild via webhook"
          echo "Configure HOMELAB_WEBHOOK_URL secret to enable auto-deploy"
